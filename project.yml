name: MagicBridge
options:
  bundleIdPrefix: me.ansarihamedani.magicbridge
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  MagicBridge:
    type: application
    platform: macOS
    sources:
      - path: MagicBridge
        excludes:
          - Info.plist
          - MagicBridge.entitlements
          - "Resources/**"
      - path: MagicBridge/Resources/blueutil_arm64
        buildPhase: resources
      - path: MagicBridge/Resources/blueutil_amd64
        buildPhase: resources
    info:
      path: MagicBridge/Info.plist
      properties:
        CFBundleShortVersionString: "1.0.5"
        CFBundleVersion: "6"
        LSUIElement: true
        NSBluetoothAlwaysUsageDescription: "MagicBridge needs Bluetooth access to detect and switch your Magic devices between Macs."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.ansarihamedani.magicbridge.app
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_ENTITLEMENTS: MagicBridge/MagicBridge.entitlements
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
    postBuildScripts:
      - name: Make blueutil executable
        script: |
          chmod +x "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/blueutil_arm64"
          chmod +x "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/blueutil_amd64"
    dependencies:
      - sdk: Network.framework
      - sdk: CoreBluetooth.framework
